run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - gocritic
    - revive

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: false
  gofmt:
    simplify: true

issues:
  exclude-dirs:
    - dist
    - vendor

name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: download modules
        run: go mod download

      - name: verify docker available
        run: |
          docker version
          docker info | head -20

      - name: go test
        run: |
          # ubuntu-latest has Docker preinstalled and running, so
          # testcontainers-based Postgres tests will run against a real PG.
          go test -race -count=1 -v ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: build binary
        run: |
          CGO_ENABLED=0 go build -o /tmp/sonarr2 ./cmd/sonarr
          mkdir -p /tmp/sonarr2-ci
          /tmp/sonarr2 -port 18989 -bind 127.0.0.1 -log-format text \
            -db-dsn "file:/tmp/sonarr2-ci/sonarr2.db?_journal=WAL&_busy_timeout=5000" &
          PID=$!
          # Wait up to 30 s for the server to become ready. Migration count
          # has grown so a fixed `sleep 1` no longer covers cold start on
          # slower CI runners.
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:18989/ping >/dev/null; then
              echo "ready after $((i / 2))s"
              break
            fi
            if ! kill -0 $PID 2>/dev/null; then
              echo "sonarr2 process died before becoming ready"
              exit 1
            fi
            sleep 0.5
          done
          curl -sf http://127.0.0.1:18989/ping
          # Extract the seeded API key from the SQLite database and use it.
          API_KEY=$(sqlite3 /tmp/sonarr2-ci/sonarr2.db "SELECT api_key FROM host_config WHERE id=1")
          curl -sf -H "X-Api-Key: $API_KEY" http://127.0.0.1:18989/api/v3/system/status
          kill $PID
          wait $PID 2>/dev/null || true
          rm -rf /tmp/sonarr2-ci
